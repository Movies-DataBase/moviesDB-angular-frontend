<img [src]="movieDetails?.['Poster']" [alt]="movieDetails?.['Title']" class="poster" style="height: 5cm;">

<div>{{ movieDetails?.['Title'] }}</div>
<div>{{ movieDetails?.['Released'] }}</div>
<div>{{ movieDetails?.['Genre'] }}</div>
<div>{{ movieDetails?.['Ratings'][0]['Value'] }}</div>
<div>{{ movieDetails?.['Ratings'][1]['Value'] }}</div>
<div>{{ movieDetails?.['Type'] }}</div>
<div>{{ movieDetails?.['Language'] }}</div>
<div>{{ movieDetails?.['Plot'] }}</div>
